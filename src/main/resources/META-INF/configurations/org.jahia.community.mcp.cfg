# MCP operation access control
# whitelist: comma-separated list of top-level GraphQL field names to allow.
#            If empty, all operations are allowed.
# blacklist: comma-separated list of top-level GraphQL field names to block.
#            If empty, no operations are blocked.
# Examples:
#   whitelist=jcr,currentUser
#   blacklist=admin,bulkCreateUsersImport
whitelist=
blacklist=
